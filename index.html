<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Oscar Palace — a premium residential plotting project on the Indore–Nagpur Highway. A luxury estate by Ruchi Realty, mindfully designed and marketed by Icon Realty." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;600;700&family=Cinzel:wght@500;600;700&family=Special+Elite&family=Outfit:wght@200;300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <title>Oscar Palace — A premium residential project on the Indore–Nagpur Highway</title>
    <style>
      html, body { background: #F6F2EC; margin: 0; }
      /* Initial loader: paints before React mounts, replaced by app render */
      #initial-loader {
        position: fixed; inset: 0; z-index: 9998;
        background: #F6F2EC;
        display: flex; align-items: center; justify-content: center;
        flex-direction: column; gap: 22px;
        font-family: 'Outfit', system-ui, -apple-system, sans-serif;
      }
      #initial-loader img {
        width: 140px; height: auto; display: block;
        animation: ilPulse 1.6s ease-in-out infinite;
      }
      #initial-loader .il-bar {
        width: 180px; height: 2px; background: rgba(20,20,20,0.10);
        border-radius: 2px; overflow: hidden; position: relative;
      }
      #initial-loader .il-bar span {
        position: absolute; inset: 0; background: #F2B68F;
        transform-origin: left;
        animation: ilProgress 1.2s cubic-bezier(0.65, 0, 0.18, 1) infinite;
      }
      #initial-loader .il-label {
        font-size: 10px; letter-spacing: 0.32em; color: #6B6B6B; font-weight: 500;
      }
      @keyframes ilPulse { 0%,100% { opacity: .8; transform: scale(1); } 50% { opacity: 1; transform: scale(1.04); } }
      @keyframes ilProgress { 0% { transform: translateX(-100%); } 50% { transform: translateX(0); } 100% { transform: translateX(100%); } }
    </style>
  </head>
  <body>
    <div id="initial-loader">
      <img src="/icon-logo.png" alt="" aria-hidden="true" />
      <div class="il-bar"><span></span></div>
      <span class="il-label">LOADING</span>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
